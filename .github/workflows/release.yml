name: release-readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run publish dry-run
        run: npm run release:dry-run

      - name: Write manual release instructions
        run: |
          {
            echo "## Manual release workflow"
            echo
            echo "Publishing for this repo is done manually from a trusted local machine."
            echo
            echo '1. `npm run version-packages`'
            echo '2. Commit the version bump and changelog update'
            echo '3. Push to `main`'
            echo '4. `npm publish --access public`'
          } >> "$GITHUB_STEP_SUMMARY"
